<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>愛屁543論壇</title>
    <meta name="description" content="愛屁543論壇是攝影愛好者交流平台，提供作品分享、攝影討論與器材交流" />
    <meta name="author" content="愛屁543論壇" />

    <meta property="og:title" content="愛屁543論壇" />
    <meta property="og:description" content="愛屁543論壇是攝影愛好者交流平台，提供作品分享、攝影討論與器材交流。" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ip543.com/" />
    <meta property="og:image" content="https://ip543.com/favicon.ico?v=20260410" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="愛屁543論壇" />
    <meta name="twitter:description" content="愛屁543論壇是攝影愛好者交流平台，提供作品分享、攝影討論與器材交流。" />
    <meta name="twitter:image" content="https://ip543.com/favicon.ico?v=20260410" />

    <link rel="canonical" href="https://ip543.com/" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=20260410" />
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico?v=20260410" />
    <link rel="apple-touch-icon" href="/favicon.ico?v=20260410" />

    <!-- Performance-first: use local/system font stack to avoid render-blocking font requests on mobile -->
    <!-- Hero banners are managed in Supabase; avoid hard-coded image preloads that can go stale. -->
    <!-- Preconnect to API origin for faster public settings and banner requests. -->
    <link rel="preconnect" href="%VITE_SUPABASE_URL%" />
    <script>
      (function () {
        const PROJECT_ID = "%VITE_SUPABASE_PROJECT_ID%" || "default";
        const CACHE_KEY = "ip543:v4:" + PROJECT_ID + ":bootstrap:public-system-settings";
        const SUPABASE_URL = "%VITE_SUPABASE_URL%";
        const SUPABASE_ANON_KEY = "%VITE_SUPABASE_PUBLISHABLE_KEY%";
        const SETTING_KEYS = [
          "site_name",
          "site_favicon_url",
          "seo_title",
          "seo_description"
        ];

        function readCachedSettings() {
          try {
            const raw = window.localStorage.getItem(CACHE_KEY);
            return raw ? JSON.parse(raw) : [];
          } catch {
            return [];
          }
        }

        function writeCachedSettings(settings) {
          try {
            window.localStorage.setItem(CACHE_KEY, JSON.stringify(settings));
          } catch {}
        }

        function findValue(settings, key, fallback) {
          const item = settings.find(function (entry) {
            return entry.setting_key === key;
          });
          return item && item.setting_value ? item.setting_value : fallback;
        }

        function upsertMeta(selector, attrs) {
          let el = document.querySelector(selector);
          if (!el) {
            el = document.createElement("meta");
            if (attrs.name) el.setAttribute("name", attrs.name);
            if (attrs.property) el.setAttribute("property", attrs.property);
            document.head.appendChild(el);
          }
          el.setAttribute("content", attrs.content);
        }

        function upsertLink(selector, attrs) {
          let el = document.querySelector(selector);
          if (!el) {
            el = document.createElement("link");
            el.setAttribute("rel", attrs.rel);
            document.head.appendChild(el);
          }
          if (attrs.type) el.setAttribute("type", attrs.type);
          el.setAttribute("href", attrs.href);
        }

        function withCacheBust(url) {
          if (!url) return url;
          return url + (url.indexOf("?") >= 0 ? "&" : "?") + "v=" + encodeURIComponent(url);
        }

        function applySettings(settings) {
          const siteName = findValue(settings, "site_name", "愛屁543論壇");
          const seoTitle = findValue(settings, "seo_title", siteName);
          const seoDescription = findValue(settings, "seo_description", "分享攝影作品、交流攝影技巧、買賣二手器材");
          const favicon = findValue(settings, "site_favicon_url", "");

          document.title = seoTitle;
          upsertMeta('meta[name="description"]', { name: "description", content: seoDescription });
          upsertMeta('meta[name="author"]', { name: "author", content: siteName });
          upsertMeta('meta[property="og:title"]', { property: "og:title", content: seoTitle });
          upsertMeta('meta[property="og:description"]', { property: "og:description", content: seoDescription });
          upsertMeta('meta[name="twitter:title"]', { name: "twitter:title", content: seoTitle });
          upsertMeta('meta[name="twitter:description"]', { name: "twitter:description", content: seoDescription });

          if (favicon) {
            const href = withCacheBust(favicon);
            const type = favicon.endsWith(".svg") ? "image/svg+xml" : favicon.endsWith(".png") ? "image/png" : "image/x-icon";
            upsertLink('link[rel="icon"]', { rel: "icon", href: href, type: type });
            upsertLink('link[rel="shortcut icon"]', { rel: "shortcut icon", href: href, type: type });
            upsertLink('link[rel="apple-touch-icon"]', { rel: "apple-touch-icon", href: href });
            upsertMeta('meta[property="og:image"]', { property: "og:image", content: href });
            upsertMeta('meta[name="twitter:image"]', { name: "twitter:image", content: href });
          }
        }

        const cached = readCachedSettings();
        if (cached.length) applySettings(cached);

        fetch(
          SUPABASE_URL +
            "/rest/v1/system_settings?select=setting_key,setting_value&setting_key=in.(" +
            SETTING_KEYS.join(",") +
            ")",
          {
            headers: {
              apikey: SUPABASE_ANON_KEY,
              Authorization: "Bearer " + SUPABASE_ANON_KEY
            }
          }
        )
          .then(function (response) {
            return response.ok ? response.json() : Promise.reject(new Error("Failed to load public settings"));
          })
          .then(function (settings) {
            if (Array.isArray(settings) && settings.length) {
              writeCachedSettings(settings);
              applySettings(settings);
            }
          })
          .catch(function () {});
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
